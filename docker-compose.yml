version: "3.8"

services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://20.112.19.16:3000
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      - backend

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "3000:3000"

    restart: always

    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://cleaneruser:cleanerpass@postgres:5432/dnscleaner?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: dns-postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: cleaneruser
      POSTGRES_PASSWORD: cleanerpass
      POSTGRES_DB: dnscleaner

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleaneruser -d dnscleaner"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:alpine
    container_name: dns-redis

    ports:
      - "6379:6379"

    restart: always

volumes:
  postgres_data: